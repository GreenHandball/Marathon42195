<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a6fc4">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Running The World">
<meta name="mobile-web-app-capable" content="yes">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='110' fill='%231a6fc4'/%3E%3Ccircle cx='256' cy='256' r='150' fill='none' stroke='white' stroke-width='20'/%3E%3Cellipse cx='256' cy='256' rx='62' ry='150' fill='none' stroke='white' stroke-width='12' opacity='0.6'/%3E%3Cline x1='106' y1='256' x2='406' y2='256' stroke='white' stroke-width='12' opacity='0.6'/%3E%3Ccircle cx='310' cy='180' r='30' fill='%23f0c040'/%3E%3C/svg%3E">
<title>Running The World</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
  html, body { margin:0; padding:0; background:#f2f7fc; overscroll-behavior-y:none; }
  body { font-family:'DM Sans',sans-serif; -webkit-font-smoothing:antialiased; }
  input, select, textarea { font-size:16px; }
  #root { min-height:100vh; }
  ::-webkit-scrollbar { width:0; height:0; }
  #splash { position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; background:linear-gradient(135deg,#e0eefc,#f2f7fc,#d4e8f8); z-index:9999; gap:20px; }
  #splash .spinner { width:34px; height:34px; border:3px solid #ccddf0; border-top-color:#1a6fc4; border-radius:50%; animation:spin 0.8s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }
</style>
</head>
<body>
<div id="splash">
  <svg width="72" height="72" viewBox="0 0 48 48">
    <circle cx="24" cy="24" r="22" fill="none" stroke="#1a6fc4" stroke-width="2.5"/>
    <ellipse cx="24" cy="24" rx="9" ry="22" fill="none" stroke="#1a6fc4" stroke-width="1.3" opacity="0.55"/>
    <line x1="2" y1="24" x2="46" y2="24" stroke="#1a6fc4" stroke-width="1.3" opacity="0.55"/>
    <circle cx="32" cy="14" r="4.2" fill="#c08820"/>
  </svg>
  <div style="text-align:center;line-height:0.95">
    <div style="display:flex;align-items:flex-end;justify-content:center;font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:4px;color:#152235">
      <span>RUNN</span>
      <svg viewBox="0 0 20 34" style="height:1.8rem;width:1.05rem;margin:0 3px;display:block;transform:translateY(1px)">
        <circle cx="11" cy="5" r="4" fill="#c08820"/>
        <path d="M11 9 L8.5 19" stroke="#c08820" stroke-width="3" stroke-linecap="round"/>
        <path d="M10 12 L16 11" stroke="#c08820" stroke-width="2.6" stroke-linecap="round"/>
        <path d="M9.5 12 L4 14 L6 18" stroke="#c08820" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <path d="M8.5 19 L14 24 L13 31" stroke="#c08820" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        <path d="M8.5 19 L4 26 L1 30" stroke="#c08820" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
      <span>NG</span>
    </div>
    <div style="font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:2px;color:#1a6fc4">THE WORLD</div>
  </div>
  <div class="spinner"></div>
</div>
<div id="root"></div>

<script src="./bundle.js"></script>
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js").then(reg => {
      // Check for updates whenever the page loads / regains focus
      reg.update();
      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "visible") reg.update();
      });
      // When a new SW takes control, reload once to show the new version
      reg.addEventListener("updatefound", () => {
        const nw = reg.installing;
        if (!nw) return;
        nw.addEventListener("statechange", () => {
          if (nw.state === "installed" && navigator.serviceWorker.controller) {
            nw.postMessage("skipWaiting");
          }
        });
      });
    }).catch(err => console.log("SW fejl:", err));

    let reloaded = false;
    navigator.serviceWorker.addEventListener("controllerchange", () => {
      if (reloaded) return;
      reloaded = true;
      window.location.reload();
    });
  });
}
</script>
</body>
</html>
