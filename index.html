function t2s(t) {
  if (t == null) return null; const str = String(t).trim(); if (!str) return null;
  const p = str.split(":").map(Number); if (p.some(isNaN)) return null;
  if (p.length === 3) return p[0]*3600 + p[1]*60 + p[2];
  if (p.length === 2) return p[0]*60 + p[1];
  if (p.length === 1) return p[0]; return null;
}
function s2t(s) {
  if (s == null || isNaN(s)) return "–"; s = Math.round(s);
  const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sc = s%60;
  if (h > 0) return `${h}:${String(m).padStart(2,"0")}:${String(sc).padStart(2,"0")}`;
  return `${String(m).padStart(2,"0")}:${String(sc).padStart(2,"0")}`;
}
function paceFmt(dist, secs) { if (!secs || !dist) return "–"; return s2t(Math.round(secs/dist)) + "/km"; }
function fmtDate(d) { if (!d) return "–"; return new Date(d).toLocaleDateString("da-DK", { year:"numeric", month:"short", day:"numeric" }); }
function uid() { return Date.now() + "_" + Math.random().toString(36).slice(2); }

function computeRace(checkpointsRaw) {
  const arr = Array.isArray(checkpointsRaw) ? checkpointsRaw : [];
  const safe = Array.from({length:10}, (_,i)=> arr[i] != null ? arr[i] : "");
  const cum = safe.map(t2s); const total = cum[9]; const half = cum[4];
  const segs = SEGMENTS.map(seg => {
    const start = seg.from === -1 ? 0 : cum[seg.from]; const end = cum[seg.to];
    if (start == null || end == null) return null; return end - start;
  });
  const secondHalf = (total != null && half != null) ? total - half : null;
  const seg2025 = (cum[5] != null && cum[3] != null) ? cum[5] - cum[3] : null;
  return { cum, segs, total, half, secondHalf, seg2025 };
}

function validateRace(r) {
  const problems = []; if (!r || typeof r !== "object") return ["Ugyldigt løb"];
  if (!r.name || !String(r.name).trim()) problems.push("Mangler navn");
  if (!r.country) problems.push("Mangler land"); else if (!COUNTRY_ISO[r.country]) problems.push("Ukendt land");
  if (!r.date) problems.push("Mangler dato");
  const cps = Array.isArray(r.checkpointsRaw) ? r.checkpointsRaw : []; const cum = cps.map(t2s);
  if (cum[9] == null) problems.push("Mangler sluttid");
  let prev = null, outOfOrder = false;
  for (let i = 0; i < 10; i++) { const v = cum[i]; if (v == null) continue; if (prev != null && v < prev) outOfOrder = true; prev = v; }
  if (outOfOrder) problems.push("Tider er ikke stigende");
  const filled = cum.filter(v => v != null).length; if (filled > 0 && filled < 10) problems.push(`Mangler ${10 - filled} mellemtid(er)`);
  if (filled === 0) problems.push("Ingen tider angivet"); return problems;
}
