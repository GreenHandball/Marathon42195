<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a6fc4">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Running The World">
<title>Running The World</title>

<style>
:root{--bg:#f4f7fa;--card:#ffffff;--text:#152235;--text-muted:#6a87a8;--primary:#1a6fc4;--primary-dark:#125293;--accent:#c08820;--border:#e2ebf3;--shadow:0 10px 30px rgba(26,111,196,0.06);--radius:16px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
#splash-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:#ffffff;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.4s ease,visibility 0.4s ease;padding:24px;text-align:center}
.splash-card{background:#ffffff;padding:40px 32px;border-radius:24px;box-shadow:0 20px 50px rgba(0,0,0,0.05);max-width:380px;width:100%;border:1px solid #f0f4f8}
.splash-logo{font-size:2.4rem;font-weight:bold;color:var(--accent);margin-bottom:12px;line-height:1}
.splash-subtitle{font-size:0.95rem;color:var(--primary);font-weight:500;margin-bottom:32px;opacity:0.8}
.spinner-box{display:flex;justify-content:center;align-items:center;margin-bottom:24px}
.spinner{width:28px;height:28px;border:3px solid #eaf2f9;border-top:3px solid var(--primary);border-radius:50%;animation:spin 0.8s linear infinite}
.splash-text{font-size:0.9rem;color:var(--primary);font-weight:600}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
</style>

<script>
function removeSplash(){
  const s = document.getElementById("splash-screen");
  if(s){
    s.style.opacity = "0";
    s.style.visibility = "hidden";
    setTimeout(() => s.remove(), 400);
  }
}

window.onerror = function(message, source, lineno, colno, error) {
  removeSplash();
  alert("Fejl: " + message + "\nLinje: " + lineno);
  return false;
};
</script>

<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
</head>
<body>

<div id="splash-screen">
  <div class="splash-card">
    <div class="splash-logo">RUNNING THE WORLD</div>
    <div class="splash-subtitle">Babel-fejl elimineret</div>
    <div class="spinner-box">
      <div class="spinner"></div>
    </div>
    <div class="splash-text">Åbner appen i rent format...</div>
  </div>
</div>

<div id="root"></div>

<script>
const { useState, useEffect } = React;

const DB = {
  get: function() { 
    try { 
      var d = localStorage.getItem("rtw_races"); 
      return d ? JSON.parse(d) : []; 
    } catch(e) { 
      return []; 
    } 
  },
  save: function(data) { 
    try { 
      localStorage.setItem("rtw_races", JSON.stringify(data)); 
    } catch(e) {} 
  }
};

function App() {
  const [races, setRaces] = useState(function() { return DB.get(); });
  
  useEffect(function() {
    removeSplash();
  }, []);

  // Rent React uden JSX-tags, så det virker fejlfrit på alle iPhones
  return React.createElement(
    "div", 
    { style: { padding: "24px", textAlign: "center", minHeight: "100vh", display: "flex", flexDirection: "column", justifyContent: "center" } },
    React.createElement("h1", { style: { fontSize: "2.5rem", color: "var(--primary)", marginBottom: "8px" } }, "🎉 KODEN VIRKER!"),
    React.createElement("p", { style: { color: "var(--text-muted)", marginBottom: "24px" } }, "Din iPhone accepterer koden 100% nu uden Babel."),
    React.createElement(
      "div", 
      { style: { background: "var(--card)", padding: "20px", borderRadius: "16px", boxShadow: "var(--shadow)", maxWidth: "400px", margin: "0 auto" } },
      React.createElement("p", { style: { fontSize: "1.1rem", color: "var(--accent)", fontWeight: "bold" } }, races.length + " gemte maratonløb")
    )
  );
}

try {
  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(React.createElement(App));
} catch (e) {
  removeSplash();
  alert("Render fejl: " + e.message);
}
</script>
</body>
</html>
