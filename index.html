<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a6fc4">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Running The World">
<title>Running The World</title>

<style>
:root{--bg:#f4f7fa;--card:#ffffff;--text:#152235;--text-muted:#6a87a8;--primary:#1a6fc4;--primary-dark:#125293;--accent:#c08820;--border:#e2ebf3;--shadow:0 10px 30px rgba(26,111,196,0.06);--radius:16px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
#splash-screen{position:fixed;top:0;left:0;width:100%;height:100%;background:#ffffff;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;transition:opacity 0.4s ease,visibility 0.4s ease;padding:24px;text-align:center}
.splash-card{background:#ffffff;padding:40px 32px;border-radius:24px;box-shadow:0 20px 50px rgba(0,0,0,0.05);max-width:380px;width:100%;border:1px solid #f0f4f8}
.splash-logo{font-size:2.4rem;font-weight:bold;color:var(--accent);margin-bottom:12px;line-height:1}
.splash-subtitle{font-size:0.95rem;color:var(--primary);font-weight:500;margin-bottom:32px;opacity:0.8}
.spinner-box{display:flex;justify-content:center;align-items:center;margin-bottom:24px}
.spinner{width:28px;height:28px;border:3px solid #eaf2f9;border-top:3px solid var(--primary);border-radius:50%;animation:spin 0.8s linear infinite}
.splash-text{font-size:0.9rem;color:var(--primary);font-weight:600}
@keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
</style>

<script>
// 🚨 BOMBESIKKER REDNINGS-KODE:
// Denne funktion fjerner venteskærmen med det samme
function removeSplash(){
  const s = document.getElementById("splash-screen");
  if(s){
    s.style.opacity = "0";
    s.style.visibility = "hidden";
    setTimeout(() => s.remove(), 400);
  }
}

// Hvis intet er vågnet om 3 sekunder, fjerner vi venteskærmen uanset hvad!
setTimeout(() => {
  const s = document.getElementById("splash-screen");
  if(s) {
    console.log("Tvinger splash væk via nød-timer");
    removeSplash();
    // Hvis appen slet ikke er bygget endnu, skriver vi hvorfor:
    if(!window.React || !window.ReactDOM) {
      document.getElementById("root").innerHTML = 
        "<div style='padding:24px;text-align:center;margin-top:40px;'>" +
        "<h2 style='color:#e53e3e'>⚠️ Netværks- eller Browserfejl</h2>" +
        "<p style='color:#6a87a8;margin:12px 0;'>Safari på din iPhone kan ikke indlæse de nødvendige filer (React/Babel) fra internettet.</p>" +
        "<p style='font-size:0.85rem;color:#a0aec0;'>Prøv at slå 'Privat tilstand' fra, eller tjek din internetforbindelse.</p></div>";
    }
  }
}, 3000);

// Fang fejl i eksterne scripts før de overhovedet rammer React
window.onerror = function(message, source, lineno, colno, error) {
  removeSplash();
  alert("Browser-fejl fanget: " + message + "\nFra: " + source);
  return false;
};
</script>

<!-- Eksterne biblioteker -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js" defer></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin></script>
</head>
<body>

<div id="splash-screen">
  <div class="splash-card">
    <div class="splash-logo">RUNNING THE WORLD</div>
    <div class="splash-subtitle">Nød-timer aktiveret</div>
    <div class="spinner-box">
      <div class="spinner"></div>
    </div>
    <div class="splash-text">Forsøger at tvinge hul igennem...</div>
  </div>
</div>

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;

const DB = {
  get: () => { try { const d = localStorage.getItem("rtw_races"); return d ? JSON.parse(d) : []; } catch(e) { return []; } },
  save: (data) => { try { localStorage.setItem("rtw_races", JSON.stringify(data)); } catch(e) {} }
};

function App() {
  const [races, setRaces] = useState(() => DB.get());
  
  useEffect(() => {
    removeSplash();
  }, []);

  return (
    <div style={{padding:"24px", textAlign:"center", minHeight:"100vh", display:"flex", flexDirection:"column", justifyContent:"center"}}>
      <h1 style={{fontSize:"2.5rem", color:"var(--primary)", marginBottom:"8px"}}>✅ HUL IGENNEM!</h1>
      <p style={{color:"var(--text-muted)", marginBottom:"24px"}}>React koderne virker nu live på din iPhone.</p>
      <div style={{background:"var(--card)", padding:"20px", borderRadius:"16px", boxShadow:"var(--shadow)", maxWidth:"400px", margin:"0 auto"}}>
        <p style={{fontSize:"1.1rem", color:"var(--accent)", fontWeight:"bold"}}>{races.length} gemte maratonløb</p>
      </div>
    </div>
  );
}

try {
  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(<App />);
} catch (e) {
  removeSplash();
  alert("Render fejl: " + e.message);
}
</script>
</body>
</html>
